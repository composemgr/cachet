# nginx proxy address - http://172.17.0.1:8100

name: cachet
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: ghcr.io/cachethq/cachet:latest
    pull_policy: always
    container_name: cachet-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - cachet
    ports:
      - "172.17.0.1:8100:8000"
    environment:
      TZ: ${TZ:-America/New_York}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: http://${BASE_HOST_NAME:-localhost}
      APP_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DB_DRIVER: pgsql
      DB_HOST: cachet-db
      DB_PORT: 5432
      DB_DATABASE: ${DB_CREATE_DATABASE_NAME:-cachet}
      DB_USERNAME: ${DB_USER_NAME:-cachet}
      DB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MAIL_DRIVER: smtp
      MAIL_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      MAIL_PORT: ${EMAIL_SERVER_PORT:-587}
      MAIL_USERNAME: ${EMAIL_SERVER_USER:-}
      MAIL_PASSWORD: ${EMAIL_SERVER_PASS:-}
      MAIL_FROM_ADDRESS: ${EMAIL_SERVER_MAIL_FROM:-cachet@example.com}
    volumes:
      - ./volumes/data/cachet:/data
      - ./volumes/config/cachet:/config
    depends_on:
      cachet-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  cachet-db:
    image: postgres:latest
    pull_policy: always
    container_name: cachet-db
    hostname: cachet-db
    restart: always
    logging: *default-logging
    networks:
      - cachet
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-cachet}
      POSTGRES_USER: ${DB_USER_NAME:-cachet}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/cachet:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cachet:
    name: cachet
    external: false
